<style>

  <!-- Dot grid background pattern -->
  <pattern id="dots" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
    <circle cx="12.5" cy="12.5" r="0.55" fill="#0c1c30"/>
  </pattern>

  <!-- Node fill gradient -->
  <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#06152a"/>
    <stop offset="100%" stop-color="#030e1e"/>
  </linearGradient>

  <!-- Key node fill gradient (brighter) -->
  <linearGradient id="ngk" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#071a34"/>
    <stop offset="100%" stop-color="#041224"/>
  </linearGradient>

  <!-- Glow for nodes -->
  <filter id="node-glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Glow for title -->
  <filter id="title-glow" x="-15%" y="-60%" width="130%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Glow for particles -->
  <filter id="p-glow" x="-300%" y="-300%" width="700%" height="700%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Arrowhead -->
  <marker id="arr" markerWidth="6" markerHeight="4" refX="5.5" refY="2" orient="auto">
    <path d="M 0 0 L 6 2 L 0 4 Z" fill="#03e8b5" opacity="0.55"/>

    <path d="M 0 0 L 7 2.5 L 0 5 Z" fill="#03e8b5" opacity="0.7"/>
